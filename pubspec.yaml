name: cavoa
description: CAVO Flutter app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.0.3
  google_sign_in: ^7.2.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/cavo_app_icon.png
  min_sdk_android: 21
  adaptive_icon_background: assets/branding/cavo_icon_bg.png
  adaptive_icon_foreground: assets/branding/cavo_icon_fg.png
  adaptive_icon_monochrome: assets/branding/cavo_icon_fg.png

flutter:
  uses-material-design: true

  assets:
    - assets/branding/