name: cavoa
description: CAVO Flutter app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: any

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  image_path: assets/branding/cavo_logo_circle.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/branding/cavo_logo_circle.png
