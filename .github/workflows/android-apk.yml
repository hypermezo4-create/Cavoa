name: Build CAVO APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create missing platform files
        run: flutter create .

      - name: Set app name to CAVO
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">CAVO</string>
          </resources>
          EOF
          python3 - <<'PY'
          from pathlib import Path
          p = Path("android/app/src/main/AndroidManifest.xml")
          s = p.read_text()
          s = s.replace('android:label="cavoa"', 'android:label="@string/app_name"')
          s = s.replace('android:label="Cavoa"', 'android:label="@string/app_name"')
          s = s.replace('android:label="cavo"', 'android:label="@string/app_name"')
          p.write_text(s)
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze project
        run: flutter analyze
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cavo-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk