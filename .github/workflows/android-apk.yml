name: Build Signed Android Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Create Android platform files if missing
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi

      - name: Set app name to CAVO
        run: |
          APP_FILE="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="[^"]*"/android:label="CAVO"/' "$APP_FILE"

      - name: Decode keystore from GitHub secret
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/cavo-release.jks

      - name: Build unsigned release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Locate apksigner
        id: apksigner
        run: |
          APKSIGNER_PATH=$(find "$ANDROID_SDK_ROOT/build-tools" -name apksigner | sort | tail -n 1)
          echo "path=$APKSIGNER_PATH" >> "$GITHUB_OUTPUT"

      - name: Sign APK with V1 + V2 + V3
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          UNSIGNED_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED_APK="android/app/build/outputs/apk/release/CAVO-release-signed.apk"

          "${{ steps.apksigner.outputs.path }}" sign \
            --ks android/app/cavo-release.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"

      - name: Verify APK signatures
        run: |
          SIGNED_APK="android/app/build/outputs/apk/release/CAVO-release-signed.apk"
          "${{ steps.apksigner.outputs.path }}" verify --verbose --print-certs "$SIGNED_APK" | tee apksigner-verify.txt

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cavo-release-signed-apk
          path: android/app/build/outputs/apk/release/CAVO-release-signed.apk

      - name: Upload signature report
        uses: actions/upload-artifact@v4
        with:
          name: cavo-signature-report
          path: apksigner-verify.txt